name: List Repository Files

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Ручной запуск из вкладки Actions

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List all files
        run: |
          echo "Все файлы в репозитории"
          find . -type f | sort

      - name: Show directory structure
        run: |
          echo "Структура директорий"
          ls -la
